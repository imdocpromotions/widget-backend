<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream TTS Overlay</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        #tts-alert-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .tts-alert {
            background: rgba(0, 0, 0, 0.85);
            color: #ffffff;
            padding: 15px 25px;
            border-radius: 8px;
            border-left: 5px solid #ff4e00; 
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateX(-50px);
            transition: all 0.4s ease-in-out;
            max-width: 400px;
            word-wrap: break-word;
        }

        .tts-alert.show {
            opacity: 1;
            transform: translateX(0);
        }

        .voice-name {
            color: #ffca28; 
            text-transform: uppercase;
            font-weight: bold;
        }

        .username {
            color: #00e676;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="tts-alert-container"></div>

    <script>
        // Clean, automatic connection since it lives in the backend folder
        const socket = io(); 
        
        let audioQueue = [];
        let isPlaying = false;

        console.log("Connecting to backend stream socket...");

        socket.on('connect', () => {
            console.log("Successfully connected to the backend notification server!");
        });

        socket.on('triggerTTS', (data) => {
            console.log("[Received Audio Request]:", data);
            audioQueue.push(data);
            processQueue();
        });

        function processQueue() {
            if (isPlaying || audioQueue.length === 0) return;

            isPlaying = true;
            const currentJob = audioQueue.shift();

            const container = document.getElementById('tts-alert-container');
            const alertEl = document.createElement('div');
            alertEl.className = 'tts-alert';
            
            if (currentJob.voice === 'trump') alertEl.style.borderLeftColor = '#1565c0';
            if (currentJob.voice === 'speed') alertEl.style.borderLeftColor = '#cc0000';
            if (currentJob.voice === 'riley') alertEl.style.borderLeftColor = '#ffeb3b';

            alertEl.innerHTML = `<span class="username">${currentJob.user}</span> made <span class="voice-name">${currentJob.voice}</span> say:<br>"${currentJob.text}"`;
            container.appendChild(alertEl);

            setTimeout(() => alertEl.classList.add('show'), 50);

            const audio = new Audio(currentJob.audioUrl);
            
            audio.play().catch(err => {
                console.error("Audio playback blocked or failed:", err);
                removeAlertAndContinue(alertEl);
            });

            audio.onended = () => {
                removeAlertAndContinue(alertEl);
            };
        }

        function removeAlertAndContinue(element) {
            element.classList.remove('show');
            setTimeout(() => {
                element.remove();
                isPlaying = false;
                setTimeout(processQueue, 400); 
            }, 400);
        }
    </script>
</body>
</html>
